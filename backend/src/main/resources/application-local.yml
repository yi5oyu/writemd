spring:
  application:
    name: backend
  mvc:
    async:
      request-timeout: 300000
  devtools:
    livereload:
      enabled: false
    restart:
      enabled: false

  datasource:
    hikari:
      maximum-pool-size: 30
    url: jdbc:mysql://db:3306/md?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: writemd
    password: ${MYSQL_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        generate_statistics: true

  session:
    store-type: none

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: http://localhost:8888/login/oauth2/code/github
            scope: read:user, user:email, repo

  ai:
    anthropic:
      api-key: dummy-key-not-used
    openai:
      api-key: dummy-key-not-used
    mcp:
      client:
        enabled: true
        name: writemd-mcp-client
        version: 1.0.0
        request-timeout: 120s
        type: SYNC
        toolcallback:
          enabled: true
        sse:
          connections:
            py-mcp-server:
              url: http://py-mcp-server:9889/sse

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000 # 30분
  refresh-token-validity: 604800000 # 7일
  guest-refresh-token-validity: 86400000 # 1일

management:
  endpoints:
    web:
      exposure:
        include: '*'
        exclude: 'info'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true

app:
  frontend:
    url: ${FRONTEND_URL}
  test:
    load-test-key: ${LOAD_TEST_KEY:default-test-key}
  guest:
    openai-api-key: ${GUEST_OPENAI_API_KEY}
    ai-daily-limit: 10
  async:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100
    scheduler:
      pool-size: 10

server:
  port: 8888
  address: 0.0.0.0
  tomcat:
    threads:
      max: 300
    connection-timeout: 300000
#  servlet:
#    session:
#      timeout: 30m

logging:
  level:
    org.springframework.cache: DEBUG
    com.writemd.backend.service.CachingDataService: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.ai: INFO
    org.springframework.web: DEBUG
