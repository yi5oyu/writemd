query($username: String!) {
  user(login: $username) {
    repositories(first: 100, orderBy: {field: PUSHED_AT, direction: DESC}) {
      nodes {
        databaseId
        name
        defaultBranchRef {
          name
          target {
            ... on Commit {
              tree {
                entries {
                  name
                  type
                  oid
                }
              }
            }
          }
        }
      }
    }
  }
}